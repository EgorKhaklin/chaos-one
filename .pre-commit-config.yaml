repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: no-em-dash
        name: no em-dashes in prose (use commas, colons, or parentheses)
        entry: '—'
        language: pygrep
        types: [text]
        exclude: '^(\.pre-commit-config\.yaml|unity/Library/|unity/Temp/)'
        files: '\.(md|txt|cs|py|yml|yaml)$'
